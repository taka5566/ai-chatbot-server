<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Powered by Poe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="chat-header">
            <h1>🤖 AI Chatbot</h1>
            <div class="header-controls">
                <select id="personality">
                    <option value="jackson">Jackson (Portfolio Assistant)</option>
                    <option value="claude">Claude 3.5 Sonnet</option>
                    <option value="friendly">Friendly Assistant</option>
                    <option value="professional">Professional Assistant</option>
                    <option value="creative">Creative Assistant</option>
                </select>
                <select id="language">
                    <option value="en">English</option>
                    <option value="zh">中文 (Chinese)</option>
                    <option value="ja">日本語 (Japanese)</option>
                </select>
            </div>
        </div>

        <div class="personality-info" id="personality-info">
            <strong>Jackson</strong>: Your portfolio AI assistant
        </div>

        <div id="chat-messages" class="chat-messages"></div>

        <div class="chat-input">
            <input 
                type="text" 
                id="message-input" 
                placeholder="Type your message..."
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
